set_zone_temperature:
  name: Set Zone Temperature
  description: Set target temperature for a specific zone.
  fields:
    zone_id:
      name: Zone ID
      description: The ID of the zone to set the temperature for.
      required: true
      selector:
        text:
    temperature:
      name: Temperature
      description: The target temperature.
      required: true
      selector:
        number:
          min: 40
          max: 100
          step: 1
    entry_id:
      name: Entry ID
      description: Config entry ID (optional, for multi-instance setups).
      required: false
      selector:
        text:

set_schedule:
  name: Set Schedule
  description: Set schedule entries for a specific day or day group.
  fields:
    day:
      name: Day
      description: "Day name (monday-sunday) or group (weekday, weekend)."
      required: true
      selector:
        select:
          options:
            - weekday
            - weekend
            - monday
            - tuesday
            - wednesday
            - thursday
            - friday
            - saturday
            - sunday
    entries:
      name: Entries
      description: List of schedule entries with time_start, time_end, and target_temp.
      required: true
      selector:
        object:
    entry_id:
      name: Entry ID
      description: Config entry ID (optional).
      required: false
      selector:
        text:

clear_learned_schedule:
  name: Clear Learned Schedule
  description: Clear all learned schedule patterns from the learning engine.
  fields:
    entry_id:
      name: Entry ID
      description: Config entry ID (optional).
      required: false
      selector:
        text:

set_preset:
  name: Set Preset
  description: Activate a schedule preset.
  fields:
    preset:
      name: Preset
      description: The preset to activate.
      required: true
      selector:
        select:
          options:
            - home
            - away
            - work_from_home
            - sleep
    entry_id:
      name: Entry ID
      description: Config entry ID (optional).
      required: false
      selector:
        text:

assign_sensor_to_zone:
  name: Assign Sensor to Zone
  description: Assign a temperature or occupancy sensor to a zone.
  fields:
    zone_id:
      name: Zone ID
      description: The ID of the zone to assign the sensor to.
      required: true
      selector:
        text:
    sensor_entity:
      name: Sensor Entity
      description: The entity ID of the sensor to assign.
      required: true
      selector:
        entity:
          domain:
            - sensor
            - binary_sensor
    sensor_type:
      name: Sensor Type
      description: Type of sensor being assigned.
      required: false
      default: temperature
      selector:
        select:
          options:
            - temperature
            - occupancy
    entry_id:
      name: Entry ID
      description: Config entry ID (optional).
      required: false
      selector:
        text:

remove_sensor_from_zone:
  name: Remove Sensor from Zone
  description: Remove a temperature or occupancy sensor from a zone.
  fields:
    zone_id:
      name: Zone ID
      description: The ID of the zone to remove the sensor from.
      required: true
      selector:
        text:
    sensor_entity:
      name: Sensor Entity
      description: The entity ID of the sensor to remove.
      required: true
      selector:
        entity:
          domain:
            - sensor
            - binary_sensor
    sensor_type:
      name: Sensor Type
      description: Type of sensor being removed.
      required: false
      default: temperature
      selector:
        select:
          options:
            - temperature
            - occupancy
    entry_id:
      name: Entry ID
      description: Config entry ID (optional).
      required: false
      selector:
        text:
